<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Preferences</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="./Preferences.css">
</head>
<body>
    <h1>Preferences</h1>
    <br />

    <div class="preference-entry">
        <label for="dark-mode">Theme:</label>
        <select name="dark-mode" id="dark-mode">
            <option value="System">System</option>
            <option value="Dark">Dark</option>
            <option value="Light">Light</option>
        </select>
    </div>

    <div class="preference-entry">
        <label for="unity-path">Path to Unity executable:</label>
        <input id="unity-path" type="text" value="" />
        <button id="btn-select-unity-path" type="button">Select</button>
    </div>

    <div class="preference-entry">
        <label for="package-registry-name">Package registry name:</label>
        <input id="package-registry-name" type="text" value="" /><br />
    </div>

    <div class="preference-entry">
        <label for="package-registry-url">Package registry url:</label>
        <input id="package-registry-url" type="text" value="" /><br />
    </div>

    <div class="preference-entry">
        <label for="package-registry-scope">Package registry scope:</label>
        <input id="package-registry-scope" type="text" value="" /><br />
    </div>

    <script>
        require('../../../dist/src/Editor/Preferences/Preferences.js');
    </script>
</body>
</html>
