stages:
  - build
#  - test

tsc:
  image: node:latest
  stage: build
  cache:
    paths:
      - code/node_modules
  before_script:
    - node -v
    - npm -v
    - cd code/
    - npm i yarn
    - yarn -v
    - npm i
  script:
    - npm run build
  tags:
    - docker

